name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

  test:
    name: Test (Deno ${{ matrix.deno-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deno-version: [v1.x, v2.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ matrix.deno-version }}-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-${{ matrix.deno-version }}-

      - name: Run tests
        run: deno test -A --no-check tests/

  build-npm:
    name: Build npm package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build npm package via dnt
        run: deno run -A scripts/build-npm.ts

      - name: Verify npm package
        working-directory: npm
        run: npm publish --dry-run

      - name: Upload npm build artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-build
          path: npm/
          retention-days: 7
