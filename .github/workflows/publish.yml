name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.6.4

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: ${{ runner.os }}-deno-publish-${{ hashFiles('deno.json', 'deno.lock') }}

      - name: Install dependencies
        # deno publish runs a type-check that needs npm: dependencies resolved
        # locally. Without this, jose / @supabase/supabase-js are unresolved
        # and publish fails. See https://docs.deno.com/runtime/manual/tools/install
        run: deno install --allow-scripts

      - name: Publish to JSR
        # JSR authenticates via the workflow's OIDC token when the repository
        # is linked to the JSR package — no secret is required.
        # If you have not linked the repo, run `deno publish` locally once to
        # claim the package and link the GitHub repo from the JSR dashboard.
        run: deno publish --allow-dirty

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: publish-jsr
    permissions:
      # OIDC token used by npm Trusted Publishing — no NPM_TOKEN needed.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.6.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 ships npm >= 10.9; we upgrade to npm@latest below to
          # guarantee >= 11.5.1 (required for Trusted Publishing).
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Build npm package via dnt
        run: deno run -A scripts/build-npm.ts

      - name: Publish to npm via Trusted Publishing (OIDC)
        # No NODE_AUTH_TOKEN: npm CLI detects the GitHub Actions OIDC token
        # via id-token:write permission and exchanges it with npm registry.
        # Requires a Trusted Publisher to be configured on
        # https://www.npmjs.com/package/@murich/supabase-multi-issuer-jwt/access
        # pointing at this repo + workflow file.
        working-directory: npm
        run: npm publish --access public --provenance

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-jsr, publish-npm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
