name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.6.4

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
            node_modules
          key: ${{ runner.os }}-deno-publish-${{ hashFiles('deno.json', 'deno.lock') }}

      - name: Install dependencies
        # deno publish runs a type-check that needs npm: dependencies resolved
        # locally. Without this, jose / @supabase/supabase-js are unresolved
        # and publish fails. See https://docs.deno.com/runtime/manual/tools/install
        run: deno install --allow-scripts

      - name: Publish to JSR
        # JSR authenticates via the workflow's OIDC token when the repository
        # is linked to the JSR package — no secret is required.
        # If you have not linked the repo, run `deno publish` locally once to
        # claim the package and link the GitHub repo from the JSR dashboard.
        run: deno publish --allow-dirty

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: publish-jsr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.6.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Build npm package via dnt
        run: deno run -A scripts/build-npm.ts

      - name: Publish to npm
        working-directory: npm
        # --access public is required for scoped packages on first publish.
        # --provenance attaches an attestation linking the artifact to this
        #   exact workflow run (sigstore transparency log).
        # NODE_AUTH_TOKEN is a Granular Access Token with bypass-2FA on
        #   write commands. Switch to Trusted Publishing on a future
        #   release once the package exists and OIDC can be configured.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-jsr, publish-npm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
